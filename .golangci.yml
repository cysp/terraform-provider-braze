version: "2"

linters:
  default: all
  disable:
    - depguard
    - exhaustruct
    - funlen
    - goconst
    - gomodguard
    - lll
    - wsl
  enable:
    - gomodguard_v2
  settings:
    cyclop:
      max-complexity: 20
      package-average: 0
    varnamelen:
      ignore-names:
        - i
        - k
        - r
        - v
        - w
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      - linters:
          - gosec
        path: "internal/provider/http_client_user_agent.go"
        text: "G704: SSRF via taint analysis"
      - linters:
          - revive
        path: ".*_test.go"
        text: "dot-imports: should not use dot imports"
      - linters:
          - dupl
        path: "internal/provider/braze_(content_block|email_template)_(list_)?resource.go"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
