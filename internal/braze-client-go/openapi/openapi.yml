openapi: 3.0.3
info:
  title: Braze REST API
  version: "0.1"
components:
  securitySchemes:
    brazeApiKey:
      type: http
      scheme: bearer
      bearerFormat: Braze

security:
  - brazeApiKey: []

paths:
  /catalogs:
    get:
      summary: List catalogs
      operationId: listCatalogs
      tags:
        - Catalogs
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: './schemas/catalogs/list/response.yml#/ListCatalogsResponse'
        default:
          $ref: './responses/error.yml#/ErrorResponse'
    post:
      summary: Create catalog
      operationId: createCatalog
      tags:
        - Catalogs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/catalogs/create/request.yml#/CreateCatalogRequest'
      responses:
        '201':
          description: Catalog created successfully
          content:
            application/json:
              schema:
                $ref: './schemas/catalogs/create/response.yml#/CreateCatalogResponse'
        default:
          $ref: './responses/error.yml#/ErrorResponse'

  /catalogs/{catalog_name}:
    delete:
      summary: Delete catalog
      operationId: deleteCatalog
      tags:
        - Catalogs
      parameters:
        - name: catalog_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Catalog deleted successfully
          content:
            application/json:
              schema:
                $ref: './schemas/catalogs/delete/response.yml#/DeleteCatalogResponse'
        default:
          $ref: './responses/error.yml#/ErrorResponse'

  /catalogs/{catalog_name}/items:
    get:
      summary: List catalog items
      operationId: listCatalogItems
      tags:
        - Catalog Items
      parameters:
        - name: catalog_name
          in: path
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          headers:
            Link:
              description: Pagination links for previous and next pages. Present only when additional pages exist.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: './schemas/catalog_items/list/response.yml#/ListCatalogItemsResponse'
        default:
          $ref: './responses/error.yml#/ErrorResponse'

  /catalogs/{catalog_name}/items/{item_id}:
    post:
      summary: Create catalog item
      operationId: createCatalogItem
      tags:
        - Catalog Items
      parameters:
        - name: catalog_name
          in: path
          required: true
          schema:
            type: string
        - name: item_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/catalog_items/create/request.yml#/CreateCatalogItemRequest'
      responses:
        '201':
          description: Catalog item created successfully
          content:
            application/json:
              schema:
                $ref: './schemas/catalog_items/operation/response.yml#/CatalogItemOperationResponse'
        default:
          $ref: './responses/error.yml#/ErrorResponse'
    get:
      summary: Get catalog item
      operationId: getCatalogItem
      tags:
        - Catalog Items
      parameters:
        - name: catalog_name
          in: path
          required: true
          schema:
            type: string
        - name: item_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: './schemas/catalog_items/get/response.yml#/GetCatalogItemResponse'
        default:
          $ref: './responses/error.yml#/ErrorResponse'
    put:
      summary: Replace catalog item
      operationId: replaceCatalogItem
      tags:
        - Catalog Items
      parameters:
        - name: catalog_name
          in: path
          required: true
          schema:
            type: string
        - name: item_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/catalog_items/replace/request.yml#/ReplaceCatalogItemRequest'
      responses:
        '200':
          description: Catalog item replaced successfully
          content:
            application/json:
              schema:
                $ref: './schemas/catalog_items/operation/response.yml#/CatalogItemOperationResponse'
        default:
          $ref: './responses/error.yml#/ErrorResponse'
    delete:
      summary: Delete catalog item
      operationId: deleteCatalogItem
      tags:
        - Catalog Items
      parameters:
        - name: catalog_name
          in: path
          required: true
          schema:
            type: string
        - name: item_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Catalog item deleted successfully
          content:
            application/json:
              schema:
                $ref: './schemas/catalog_items/delete/response.yml#/DeleteCatalogItemResponse'
        default:
          $ref: './responses/error.yml#/ErrorResponse'

  /templates/email/list:
    get:
      summary: List available Email Templates
      description: List your existing Email Templates information
      operationId: listEmailTemplates
      tags:
        - Email Templates
      parameters:
        - name: modified_after
          in: query
          description: Retrieve only Email Templates updated at or after the given time
          required: false
          schema:
            type: string
            format: date-time
        - name: modified_before
          in: query
          description: Retrieve only Email Templates updated at or before the given time
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          description: Maximum number of Email Templates to retrieve
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: offset
          in: query
          description: Number of Email Templates to skip before returning results
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: './schemas/email_templates/list/response.yml#/ListEmailTemplatesResponse'
        default:
          $ref: './responses/error.yml#/ErrorResponse'

  /templates/email/info:
    get:
      summary: See Email Template information
      description: Call information for your existing Email Templates
      operationId: getEmailTemplateInfo
      tags:
        - Email Templates
      parameters:
        - name: email_template_id
          in: query
          description: Email Template identifier
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: './schemas/email_templates/info/response.yml#/GetEmailTemplateInfoResponse'
        default:
          $ref: './responses/error.yml#/ErrorResponse'

  /templates/email/create:
    post:
      summary: Create Email Template
      description: Create an Email Template on the Braze dashboard
      operationId: createEmailTemplate
      tags:
        - Email Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/email_templates/create/request.yml#/CreateEmailTemplateRequest'
      responses:
        '201':
          description: Email Template created successfully
          content:
            application/json:
              schema:
                $ref: './schemas/email_templates/create/response.yml#/CreateEmailTemplateResponse'
        default:
          $ref: './responses/error.yml#/ErrorResponse'

  /templates/email/update:
    post:
      summary: Update Email Template
      description: Update an Email Template on the Braze dashboard
      operationId: updateEmailTemplate
      tags:
        - Email Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/email_templates/update/request.yml#/UpdateEmailTemplateRequest'
      responses:
        '200':
          description: Email Template updated successfully
          content:
            application/json:
              schema:
                $ref: './schemas/email_templates/update/response.yml#/UpdateEmailTemplateResponse'
        default:
          $ref: './responses/error.yml#/ErrorResponse'

  /content_blocks/list:
    get:
      summary: List available Content Blocks
      description: List your existing Content Blocks information
      operationId: listContentBlocks
      tags:
        - Content Blocks
      parameters:
        - name: modified_after
          in: query
          description: Retrieve only Content Blocks updated at or after the given time
          required: false
          schema:
            type: string
            format: date-time
        - name: modified_before
          in: query
          description: Retrieve only Content Blocks updated at or before the given time
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          description: Maximum number of Content Blocks to retrieve (default 100, max 1000)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: offset
          in: query
          description: Number of Content Blocks to skip before returning results
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: './schemas/content_blocks/list/response.yml#/ListContentBlocksResponse'
        default:
          $ref: './responses/error.yml#/ErrorResponse'

  /content_blocks/info:
    get:
      summary: See Content Block information
      description: Call information for your existing Content Blocks
      operationId: getContentBlockInfo
      tags:
        - Content Blocks
      parameters:
        - name: content_block_id
          in: query
          description: Content Block identifier
          required: true
          schema:
            type: string
        - name: include_inclusion_data
          in: query
          description: When set to true, returns Message Variation API identifiers where this Content Block is included
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: './schemas/content_blocks/info/response.yml#/GetContentBlockInfoResponse'
        default:
          $ref: './responses/error.yml#/ErrorResponse'

  /content_blocks/create:
    post:
      summary: Create Content Block
      description: Create a Content Block on the Braze dashboard
      operationId: createContentBlock
      tags:
        - Content Blocks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/content_blocks/create/request.yml#/CreateContentBlockRequest'
      responses:
        '201':
          description: Content Block created successfully
          content:
            application/json:
              schema:
                $ref: './schemas/content_blocks/create/response.yml#/CreateContentBlockResponse'
        default:
          $ref: './responses/error.yml#/ErrorResponse'

  /content_blocks/update:
    post:
      summary: Update Content Block
      description: Update a Content Block on the Braze dashboard
      operationId: updateContentBlock
      tags:
        - Content Blocks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/content_blocks/update/request.yml#/UpdateContentBlockRequest'
      responses:
        '200':
          description: Content Block updated successfully
          content:
            application/json:
              schema:
                $ref: './schemas/content_blocks/update/response.yml#/UpdateContentBlockResponse'
        default:
          $ref: './responses/error.yml#/ErrorResponse'
